<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <rect fill="#1e293b" width="600" height="120"/>
  
  <!-- Seed button (ready state) -->
  <rect fill="#059669" x="20" y="20" width="560" height="50" rx="10" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="52" fill="white" font-family="Arial" font-size="16" font-weight="bold">🚀 Seed 10 Records (Batch)</text>
  
  <!-- Annotation -->
  <path d="M 300 80 L 300 100 L 400 100" stroke="#10b981" stroke-width="2" fill="none"/>
  <rect fill="#10b981" x="350" y="100" width="220" height="15" rx="4"/>
  <text x="360" y="111" fill="#1e293b" font-family="Arial" font-size="9" font-weight="bold">Click để bắt đầu seed data</text>
  
  <!-- Status indicators -->
  <rect fill="#0f172a" x="20" y="85" width="300" height="25" rx="4"/>
  <text x="35" y="102" fill="#10b981" font-family="Arial" font-size="10">✓ API configured</text>
  <text x="140" y="102" fill="#10b981" font-family="Arial" font-size="10">✓ Logged in</text>
  <text x="220" y="102" fill="#10b981" font-family="Arial" font-size="10">✓ Ready to seed</text>
</svg>
