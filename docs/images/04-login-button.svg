<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <rect fill="#1e293b" width="1200" height="200"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="1200" height="60"/>
  <rect fill="#3b82f6" x="20" y="12" width="40" height="36" rx="8"/>
  <text x="70" y="38" fill="white" font-family="Arial" font-size="18" font-weight="bold">Data Seeder</text>
  
  <!-- Settings button -->
  <rect fill="#334155" x="1050" y="15" width="40" height="30" rx="6"/>
  <text x="1070" y="35" fill="#94a3b8" font-family="Arial" font-size="14">⚙</text>
  
  <!-- Login button (highlighted) -->
  <rect fill="#3b82f6" x="1100" y="12" width="80" height="36" rx="8" stroke="#f59e0b" stroke-width="3"/>
  <text x="1125" y="35" fill="white" font-family="Arial" font-size="12" font-weight="bold">Login</text>
  
  <!-- Annotation -->
  <path d="M 1140 60 L 1140 90 L 1180 90" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="1080" y="90" width="120" height="35" rx="4"/>
  <text x="1090" y="108" fill="#1e293b" font-family="Arial" font-size="11" font-weight="bold">Click để đăng nhập</text>
  <text x="1090" y="120" fill="#1e293b" font-family="Arial" font-size="9">Auth Server</text>
</svg>
