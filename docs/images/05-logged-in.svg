<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <rect fill="#1e293b" width="1200" height="200"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="1200" height="60"/>
  <rect fill="#3b82f6" x="20" y="12" width="40" height="36" rx="8"/>
  <text x="70" y="38" fill="white" font-family="Arial" font-size="18" font-weight="bold">Data Seeder</text>
  
  <!-- Settings button -->
  <rect fill="#334155" x="1050" y="15" width="40" height="30" rx="6"/>
  <text x="1070" y="35" fill="#94a3b8" font-family="Arial" font-size="14">⚙</text>
  
  <!-- User info box (highlighted) -->
  <rect fill="#334155" x="1100" y="15" width="80" height="30" rx="6"/>
  <circle fill="#10b981" cx="1115" cy="30" r="5"/>
  <text x="1128" y="35" fill="#cbd5e1" font-family="Arial" font-size="11">admin</text>
  
  <!-- Logout button (highlighted) -->
  <rect fill="#7f1d1d" x="1050" y="50" width="40" height="30" rx="6" stroke="#ef4444" stroke-width="2"/>
  <text x="1070" y="68" fill="#f87171" font-family="Arial" font-size="14">↩</text>
  
  <!-- Annotation -->
  <path d="M 1140 50 L 1140 90 L 1000 90" stroke="#10b981" stroke-width="2" fill="none"/>
  <rect fill="#10b981" x="980" y="90" width="160" height="50" rx="4"/>
  <text x="990" y="108" fill="#1e293b" font-family="Arial" font-size="11" font-weight="bold">✓ Đã đăng nhập</text>
  <text x="990" y="122" fill="#1e293b" font-family="Arial" font-size="9">admin@company.com</text>
</svg>
