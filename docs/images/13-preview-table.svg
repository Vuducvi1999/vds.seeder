<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect fill="#1e293b" width="1200" height="800"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="1200" height="60"/>
  <rect fill="#3b82f6" x="20" y="12" width="40" height="36" rx="8"/>
  <text x="70" y="38" fill="white" font-family="Arial" font-size="18" font-weight="bold">Data Seeder</text>
  
  <!-- Settings button (highlighted) -->
  <rect fill="#334155" x="1050" y="15" width="40" height="30" rx="6" stroke="#f59e0b" stroke-width="3"/>
  <text x="1070" y="35" fill="#94a3b8" font-family="Arial" font-size="12">⚙</text>
  
  <!-- Login button (highlighted) -->
  <rect fill="#3b82f6" x="1100" y="12" width="80" height="36" rx="8"/>
  <text x="1125" y="35" fill="white" font-family="Arial" font-size="12">Login</text>
  
  <!-- Main content area -->
  <rect fill="#1e293b" x="20" y="80" width="1160" height="700" rx="12"/>
  
  <!-- Section title -->
  <text x="40" y="115" fill="white" font-family="Arial" font-size="16" font-weight="bold">Configuration</text>
  <text x="40" y="135" fill="#94a3b8" font-family="Arial" font-size="12">Set number of records and configure each field</text>
  
  <!-- Seed Mode section -->
  <text x="40" y="170" fill="#cbd5e1" font-family="Arial" font-size="14">Seed Mode</text>
  
  <!-- Batch button -->
  <rect fill="#1e3a5f" x="40" y="185" width="150" height="40" rx="8" stroke="#3b82f6"/>
  <text x="85" y="210" fill="#60a5fa" font-family="Arial" font-size="12">Batch</text>
  
  <!-- Sequential button -->
  <rect fill="#1e293b" x="200" y="185" width="150" height="40" rx="8" stroke="#475569"/>
  <text x="245" y="210" fill="#94a3b8" font-family="Arial" font-size="12">Sequential</text>
  
  <!-- Concurrent button -->
  <rect fill="#1e293b" x="360" y="185" width="150" height="40" rx="8" stroke="#475569"/>
  <text x="405" y="210" fill="#94a3b8" font-family="Arial" font-size="12">Concurrent</text>
  
  <!-- Count config -->
  <rect fill="#1e293b" x="40" y="245" width="200" height="60" rx="8" stroke="#475569"/>
  <text x="55" y="270" fill="#cbd5e1" font-family="Arial" font-size="12">Seed Config</text>
  <rect fill="#0f172a" x="55" y="280" width="80" height="25" rx="4"/>
  <text x="85" y="297" fill="white" font-family="Arial" font-size="14" text-anchor="middle">10</text>
  <text x="145" y="297" fill="#64748b" font-family="Arial" font-size="10">records</text>
  
  <!-- Field Generation Mode -->
  <text x="40" y="330" fill="#cbd5e1" font-family="Arial" font-size="14">Field Generation Mode</text>
  
  <!-- Field cards -->
  <rect fill="#1e3a5f" x="40" y="350" width="280" height="60" rx="8"/>
  <text x="55" y="375" fill="white" font-family="Arial" font-size="12">Event Type</text>
  <text x="55" y="392" fill="#ef4444" font-family="Arial" font-size="10">*</text>
  <circle fill="#3b82f6" cx="200" cy="380" r="6"/>
  <text x="215" y="385" fill="#60a5fa" font-family="Arial" font-size="10">Auto</text>
  
  <rect fill="#1e3a5f" x="340" y="350" width="280" height="60" rx="8"/>
  <text x="355" y="375" fill="white" font-family="Arial" font-size="12">Source Type</text>
  <text x="355" y="392" fill="#ef4444" font-family="Arial" font-size="10">*</text>
  <circle fill="#10b981" cx="500" cy="380" r="6"/>
  <text x="515" y="385" fill="#34d399" font-family="Arial" font-size="10">Fixed</text>
  
  <rect fill="#1e293b" x="40" y="420" width="280" height="60" rx="8"/>
  <text x="55" y="445" fill="white" font-family="Arial" font-size="12">Location</text>
  <text x="55" y="462" fill="#ef4444" font-family="Arial" font-size="10">*</text>
  <circle fill="#3b82f6" cx="200" cy="450" r="6"/>
  <text x="215" y="455" fill="#60a5fa" font-family="Arial" font-size="10">Auto</text>
  
  <rect fill="#1e293b" x="340" y="420" width="280" height="60" rx="8"/>
  <text x="355" y="445" fill="white" font-family="Arial" font-size="12">Image Path</text>
  <circle fill="#6b7280" cx="500" cy="450" r="6"/>
  <text x="515" y="455" fill="#9ca3af" font-family="Arial" font-size="10">NULL</text>
  
  <!-- Generate Preview button -->
  <rect fill="#3b82f6" x="40" y="510" width="180" height="40" rx="8"/>
  <text x="65" y="535" fill="white" font-family="Arial" font-size="14">👁 Generate Preview</text>
  
  <!-- Preview table area -->
  <rect fill="#1e293b" x="40" y="570" width="1120" height="180" rx="8"/>
  <text x="60" y="600" fill="white" font-family="Arial" font-size="14" font-weight="bold">Data Preview</text>
  <text x="60" y="620" fill="#64748b" font-family="Arial" font-size="11">Click cells to edit • 10 records</text>
  
  <!-- Table headers -->
  <rect fill="#0f172a" x="60" y="635" width="1080" height="30" rx="4"/>
  <text x="80" y="656" fill="#64748b" font-family="Arial" font-size="10">#</text>
  <text x="130" y="656" fill="#64748b" font-family="Arial" font-size="10">Event Type</text>
  <text x="280" y="656" fill="#64748b" font-family="Arial" font-size="10">Source Type</text>
  <text x="430" y="656" fill="#64748b" font-family="Arial" font-size="10">Device ID</text>
  <text x="580" y="656" fill="#64748b" font-family="Arial" font-size="10">Occur Date</text>
  <text x="730" y="656" fill="#64748b" font-family="Arial" font-size="10">Location</text>
  
  <!-- Table rows -->
  <rect fill="#1e293b" x="60" y="670" width="1080" height="25" rx="2"/>
  <text x="80" y="687" fill="#64748b" font-family="Arial" font-size="10">1</text>
  <rect fill="#0f172a" x="120" y="673" width="150" height="20" rx="4"/>
  <text x="140" y="687" fill="#60a5fa" font-family="Arial" font-size="9">PPE Detection</text>
  
  <rect fill="#0f172a" x="60" y="700" width="1080" height="25" rx="2"/>
  <text x="80" y="717" fill="#64748b" font-family="Arial" font-size="10">2</text>
  <rect fill="#0f172a" x="120" y="703" width="150" height="20" rx="4"/>
  <text x="140" y="717" fill="#60a5fa" font-family="Arial" font-size="9">Restricted Area</text>
  
  <!-- Annotation arrow -->
  <path d="M 900 500 L 900 570" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="905" y="540" fill="#f59e0b" font-family="Arial" font-size="11">Click để xem</text>
  <text x="905" y="555" fill="#f59e0b" font-family="Arial" font-size="11">preview</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
