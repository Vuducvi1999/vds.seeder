<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <rect fill="#1e293b" width="600" height="150"/>
  
  <!-- Result box -->
  <rect fill="#7f1d1d" x="20" y="20" width="560" height="60" rx="8" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Error icon -->
  <circle fill="#ef4444" cx="50" cy="50" r="15"/>
  <text x="50" y="56" fill="white" font-family="Arial" font-size="16" text-anchor="middle">!</text>
  
  <!-- Message -->
  <text x="80" y="48" fill="#f87171" font-family="Arial" font-size="14" font-weight="bold">Error!</text>
  <text x="80" y="65" fill="#94a3b8" font-family="Arial" font-size="12">Failed: 401 Unauthorized - Session expired</text>
  
  <!-- Auto dismiss progress bar -->
  <rect fill="#7f1d1d" x="20" y="80" width="560" height="6" rx="3"/>
  <rect fill="#ef4444" x="20" y="80" width="560" height="6" rx="3">
    <animate attributeName="width" from="560" to="0" dur="3s" fill="freeze"/>
  </rect>
  
  <!-- Note -->
  <text x="20" y="110" fill="#64748b" font-family="Arial" font-size="11">Thông báo lỗi sẽ tự động biến mất sau 3 giây</text>
  
  <!-- Suggestion -->
  <rect fill="#1e293b" x="20" y="120" width="560" height="25" rx="4"/>
  <text x="35" y="137" fill="#f59e0b" font-family="Arial" font-size="11">💡 Gợi ý: Vui lòng đăng nhập lại để tiếp tục</text>
</svg>
