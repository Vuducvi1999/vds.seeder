<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect fill="#1e293b" width="900" height="700"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="900" height="60"/>
  <text x="30" y="40" fill="white" font-family="Arial" font-size="20" font-weight="bold">Settings</text>
  
  <!-- Close button -->
  <rect fill="#334155" x="830" y="15" width="40" height="30" rx="6"/>
  <text x="850" y="35" fill="#94a3b8" font-family="Arial" font-size="14">✕</text>
  
  <!-- Form container -->
  <rect fill="#1e293b" x="50" y="100" width="800" height="550" rx="12" stroke="#475569"/>
  
  <!-- Test Connection button (highlighted) -->
  <rect fill="#f59e0b" x="70" y="620" width="180" height="45" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <text x="95" y="648" fill="white" font-family="Arial" font-size="13" font-weight="bold">⚡ Test Connection</text>
  
  <!-- Success result -->
  <rect fill="#064e3b" x="260" y="625" width="250" height="35" rx="6"/>
  <text x="275" y="648" fill="#34d399" font-family="Arial" font-size="12">✓ Connection successful</text>
  
  <!-- Annotation -->
  <path d="M 160 610 L 160 595 L 320 595" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="100" y="570" width="220" height="30" rx="4"/>
  <text x="110" y="590" fill="#1e293b" font-family="Arial" font-size="11" font-weight="bold">Kết quả kiểm tra kết nối</text>
</svg>
