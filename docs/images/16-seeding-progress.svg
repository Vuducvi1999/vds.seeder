<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
  <rect fill="#1e293b" width="600" height="180"/>
  
  <!-- Seed button (loading state) -->
  <rect fill="#059669" x="20" y="20" width="560" height="50" rx="10"/>
  
  <!-- Spinner -->
  <circle cx="60" cy="45" r="12" fill="none" stroke="#ffffff33" stroke-width="3"/>
  <path d="M 60 33 A 12 12 0 0 1 72 45" fill="none" stroke="white" stroke-width="3">
    <animateTransform attributeName="transform" type="rotate" from="0 60 45" to="360 60 45" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <text x="200" y="52" fill="white" font-family="Arial" font-size="16" font-weight="bold">Seeding 5/10...</text>
  
  <!-- Progress bar -->
  <rect fill="#0f172a" x="20" y="85" width="560" height="20" rx="10"/>
  <rect fill="#3b82f6" x="20" y="85" width="280" height="20" rx="10">
    <animate attributeName="width" from="0" to="280" dur="2s" fill="freeze"/>
  </rect>
  <text x="300" y="99" fill="white" font-family="Arial" font-size="11" text-anchor="middle">50%</text>
  
  <!-- Status -->
  <rect fill="#1e3a5f" x="20" y="120" width="560" height="45" rx="8"/>
  <text x="40" y="145" fill="#94a3b8" font-family="Arial" font-size="12">Progress: 5/10 records seeded</text>
  <text x="40" y="160" fill="#64748b" font-family="Arial" font-size="10">Elapsed: 1.25s • Estimated remaining: 1.25s</text>
  
  <!-- Annotation -->
  <path d="M 300 20 L 300 0 L 400 0" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <rect fill="#3b82f6" x="350" y="-30" width="150" height="25" rx="4"/>
  <text x="360" y="-15" fill="white" font-family="Arial" font-size="10" font-weight="bold">Đang gửi data...</text>
</svg>
