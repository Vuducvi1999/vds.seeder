<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <rect fill="#1e293b" width="500" height="200"/>
  
  <!-- Title -->
  <text x="20" y="35" fill="white" font-family="Arial" font-size="14" font-weight="bold">Seed Config (Batch Mode)</text>
  
  <!-- Config box -->
  <rect fill="#0f172a" x="20" y="50" width="250" height="80" rx="8" stroke="#475569"/>
  <text x="35" y="75" fill="#cbd5e1" font-family="Arial" font-size="12">Number of records</text>
  
  <!-- Number input -->
  <rect fill="#1e293b" x="35" y="85" width="100" height="35" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="110" fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">10</text>
  
  <!-- Plus/Minus buttons -->
  <rect fill="#334155" x="145" y="90" width="25" height="25" rx="4"/>
  <text x="157" y="108" fill="#cbd5e1" font-family="Arial" font-size="14">−</text>
  <rect fill="#334155" x="175" y="90" width="25" height="25" rx="4"/>
  <text x="187" y="108" fill="#cbd5e1" font-family="Arial" font-size="14">+</text>
  
  <!-- Description -->
  <text x="35" y="145" fill="#64748b" font-family="Arial" font-size="11">Số lượng records sẽ được tạo và gửi</text>
  
  <!-- Annotation -->
  <path d="M 85 135 L 85 155 L 130 155" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="55" y="155" width="100" height="30" rx="4"/>
  <text x="65" y="173" fill="#1e293b" font-family="Arial" font-size="10" font-weight="bold">Nhập số lượng</text>
  <text x="65" y="183" fill="#1e293b" font-family="Arial" font-size="8">records cần seed</text>
</svg>
