<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250">
  <rect fill="#1e293b" width="500" height="250"/>
  
  <!-- Title -->
  <text x="20" y="35" fill="white" font-family="Arial" font-size="14" font-weight="bold">Edit Cell in Preview</text>
  
  <!-- Cell being edited -->
  <rect fill="#1e293b" x="20" y="50" width="200" height="50" rx="8" stroke="#f59e0b" stroke-width="3"/>
  <text x="35" y="75" fill="#60a5fa" font-family="Arial" font-size="12">Event Type</text>
  
  <!-- Editable input -->
  <rect fill="#0f172a" x="35" y="90" width="250" height="35" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="50" y="113" fill="#60a5fa" font-family="Arial" font-size="11">PPE Detection</text>
  
  <!-- Dropdown indicator -->
  <text x="270" y="113" fill="#60a5fa" font-family="Arial" font-size="12">▼</text>
  
  <!-- Dropdown options -->
  <rect fill="#1e293b" x="35" y="125" width="250" height="100" rx="6" stroke="#3b82f6" stroke-width="1"/>
  <rect fill="#1e3a5f" x="40" y="130" width="240" height="25" rx="4"/>
  <text x="50" y="147" fill="#60a5fa" font-family="Arial" font-size="11">PPE Detection</text>
  <text x="230" y="147" fill="#f59e0b" font-family="Arial" font-size="10">✓</text>
  
  <rect fill="#0f172a" x="40" y="155" width="240" height="25" rx="4"/>
  <text x="50" y="172" fill="#cbd5e1" font-family="Arial" font-size="11">Restricted Area</text>
  
  <rect fill="#0f172a" x="40" y="180" width="240" height="25" rx="4"/>
  <text x="50" y="197" fill="#cbd5e1" font-family="Arial" font-size="11">Abnormal Presence</text>
  
  <!-- Annotation -->
  <path d="M 160 55 L 160 30 L 300 30" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="200" y="10" width="200" height="25" rx="4"/>
  <text x="210" y="27" fill="#1e293b" font-family="Arial" font-size="10" font-weight="bold">Click để chọn giá trị khác</text>
  
  <!-- Note -->
  <rect fill="#064e3b" x="300" y="90" width="180" height="80" rx="6"/>
  <text x="315" y="115" fill="#34d399" font-family="Arial" font-size="11">💡 Mẹo:</text>
  <text x="315" y="135" fill="#94a3b8" font-family="Arial" font-size="10">Chỉ fields ở chế độ</text>
  <text x="315" y="150" fill="#94a3b8" font-family="Arial" font-size="10">Auto mới sửa được.</text>
  <text x="315" y="165" fill="#34d399" font-family="Arial" font-size="10">Fixed/NULL = disabled</text>
</svg>
