<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180">
  <rect fill="#1e293b" width="500" height="180"/>
  
  <!-- Button -->
  <rect fill="#3b82f6" x="20" y="20" width="200" height="50" rx="8" stroke="#f59e0b" stroke-width="3"/>
  <text x="45" y="52" fill="white" font-family="Arial" font-size="16">👁 Generate Preview</text>
  
  <!-- Annotation -->
  <path d="M 120 80 L 120 120 L 200 120" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="50" y="120" width="200" height="45" rx="4"/>
  <text x="65" y="140" fill="#1e293b" font-family="Arial" font-size="12" font-weight="bold">Click để xem trước data</text>
  <text x="65" y="155" fill="#1e293b" font-family="Arial" font-size="10">trước khi seed vào database</text>
  
  <!-- Arrow pointing to result -->
  <path d="M 400 45 L 450 45" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="455" y="50" fill="#60a5fa" font-family="Arial" font-size="11">Bảng</text>
  <text x="455" y="62" fill="#60a5fa" font-family="Arial" font-size="11">Preview</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
