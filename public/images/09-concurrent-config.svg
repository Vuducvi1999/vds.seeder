<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <rect fill="#1e293b" width="600" height="250"/>
  
  <!-- Title -->
  <text x="20" y="35" fill="white" font-family="Arial" font-size="14" font-weight="bold">Concurrent Mode Config</text>
  
  <!-- Config box -->
  <rect fill="#0f172a" x="20" y="50" width="300" height="80" rx="8" stroke="#475569"/>
  <text x="35" y="75" fill="#cbd5e1" font-family="Arial" font-size="12">Concurrent Requests</text>
  
  <!-- Number input -->
  <rect fill="#1e293b" x="35" y="85" width="100" height="35" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="110" fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">5</text>
  
  <!-- Plus/Minus buttons -->
  <rect fill="#334155" x="145" y="90" width="25" height="25" rx="4"/>
  <text x="157" y="108" fill="#cbd5e1" font-family="Arial" font-size="14">−</text>
  <rect fill="#334155" x="175" y="90" width="25" height="25" rx="4"/>
  <text x="187" y="108" fill="#cbd5e1" font-family="Arial" font-size="14">+</text>
  
  <!-- Description -->
  <text x="35" y="145" fill="#64748b" font-family="Arial" font-size="11">requests will be sent in parallel</text>
  
  <!-- Visual representation -->
  <rect fill="#0f172a" x="350" y="50" width="230" height="140" rx="8"/>
  <text x="365" y="75" fill="#94a3b8" font-family="Arial" font-size="11">Sơ đồ Concurrent:</text>
  
  <!-- Request arrows -->
  <rect fill="#3b82f6" x="370" y="90" width="60" height="25" rx="4"/>
  <text x="400" y="107" fill="white" font-family="Arial" font-size="10" text-anchor="middle">Req 1</text>
  <rect fill="#3b82f6" x="370" y="120" width="60" height="25" rx="4"/>
  <text x="400" y="137" fill="white" font-family="Arial" font-size="10" text-anchor="middle">Req 2</text>
  <rect fill="#3b82f6" x="370" y="150" width="60" height="25" rx="4"/>
  <text x="400" y="167" fill="white" font-family="Arial" font-size="10" text-anchor="middle">Req 3</text>
  
  <text x="445" y="110" fill="#10b981" font-family="Arial" font-size="14">→</text>
  <text x="445" y="140" fill="#10b981" font-family="Arial" font-size="14">→</text>
  <text x="445" y="170" fill="#10b981" font-family="Arial" font-size="14">→</text>
  
  <rect fill="#10b981" x="470" y="95" width="80" height="80" rx="4"/>
  <text x="510" y="140" fill="white" font-family="Arial" font-size="11" text-anchor="middle">Backend</text>
  
  <!-- Annotation -->
  <path d="M 85 135 L 85 200 L 30 200" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="30" y="200" width="140" height="35" rx="4"/>
  <text x="40" y="218" fill="#1e293b" font-family="Arial" font-size="10" font-weight="bold">Số request gửi đồng thời</text>
  <text x="40" y="230" fill="#1e293b" font-family="Arial" font-size="8">Mỗi request = 1 record</text>
</svg>
