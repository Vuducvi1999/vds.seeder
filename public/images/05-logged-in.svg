<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <rect fill="#1e293b" width="1200" height="200"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="1200" height="60"/>
  <rect fill="#3b82f6" x="20" y="12" width="40" height="36" rx="8"/>
  <text x="70" y="38" fill="white" font-family="Arial" font-size="18" font-weight="bold">Data Seeder</text>
  
  <!-- Settings button -->
  <rect fill="#334155" x="950" y="15" width="80" height="30" rx="6"/>
  <text x="960" y="35" fill="#cbd5e1" font-family="Arial" font-size="12">Cài đặt</text>
  
  <!-- User info box -->
  <rect fill="#064e3b" x="1040" y="15" width="130" height="30" rx="6"/>
  <circle fill="#10b981" cx="1055" cy="30" r="6"/>
  <text x="1068" y="35" fill="#34d399" font-family="Arial" font-size="11">admin</text>
  
  <!-- Logout button -->
  <rect fill="#7f1d1d" x="1040" y="50" width="60" height="25" rx="4"/>
  <text x="1055" y="66" fill="#f87171" font-family="Arial" font-size="10">Đăng xuất</text>
  
  <!-- Annotation -->
  <path d="M 1105 50 L 1105 85 L 1180 85" stroke="#10b981" stroke-width="2" fill="none"/>
  <rect fill="#10b981" x="1100" y="85" width="80" height="30" rx="4"/>
  <text x="1110" y="103" fill="#1e293b" font-family="Arial" font-size="10" font-weight="bold">✓ Đã đăng nhập</text>
</svg>