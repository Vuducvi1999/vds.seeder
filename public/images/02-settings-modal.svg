<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect fill="#1e293b" width="900" height="700"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="900" height="60"/>
  <text x="30" y="40" fill="white" font-family="Arial" font-size="20" font-weight="bold">Settings</text>
  
  <!-- Close button -->
  <rect fill="#334155" x="830" y="15" width="40" height="30" rx="6"/>
  <text x="850" y="35" fill="#94a3b8" font-family="Arial" font-size="14">✕</text>
  
  <!-- Form container -->
  <rect fill="#1e293b" x="50" y="100" width="800" height="550" rx="12" stroke="#475569"/>
  
  <!-- Auth Server URL -->
  <text x="70" y="140" fill="#cbd5e1" font-family="Arial" font-size="14">Auth Server URL</text>
  <text x="210" y="140" fill="#ef4444" font-family="Arial" font-size="14">*</text>
  <rect fill="#0f172a" x="70" y="150" width="760" height="50" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="182" fill="#64748b" font-family="Arial" font-size="14">https://auth.example.com</text>
  
  <!-- Backend API URL -->
  <text x="70" y="230" fill="#cbd5e1" font-family="Arial" font-size="14">Backend API URL</text>
  <text x="200" y="230" fill="#ef4444" font-family="Arial" font-size="14">*</text>
  <rect fill="#0f172a" x="70" y="240" width="760" height="50" rx="8"/>
  <text x="90" y="272" fill="#64748b" font-family="Arial" font-size="14">https://api.example.com</text>
  
  <!-- Client ID -->
  <text x="70" y="320" fill="#cbd5e1" font-family="Arial" font-size="14">Client ID</text>
  <text x="145" y="320" fill="#ef4444" font-family="Arial" font-size="14">*</text>
  <rect fill="#0f172a" x="70" y="330" width="760" height="50" rx="8"/>
  <text x="90" y="362" fill="#64748b" font-family="Arial" font-size="14">SeedingTool</text>
  
  <!-- Redirect URI -->
  <text x="70" y="410" fill="#cbd5e1" font-family="Arial" font-size="14">Redirect URI</text>
  <text x="165" y="410" fill="#ef4444" font-family="Arial" font-size="14">*</text>
  <rect fill="#0f172a" x="70" y="420" width="760" height="50" rx="8"/>
  <text x="90" y="452" fill="#64748b" font-family="Arial" font-size="14">http://localhost:3000/callback</text>
  
  <!-- Scopes -->
  <text x="70" y="500" fill="#cbd5e1" font-family="Arial" font-size="14">Scopes</text>
  <text x="120" y="500" fill="#ef4444" font-family="Arial" font-size="14">*</text>
  <rect fill="#0f172a" x="70" y="510" width="760" height="100" rx="8"/>
  
  <!-- Scope checkboxes -->
  <rect fill="#1e3a5f" x="85" y="525" width="120" height="30" rx="4"/>
  <rect fill="#3b82f6" x="90" y="530" width="18" height="18" rx="3"/>
  <text x="115" y="545" fill="#60a5fa" font-family="Arial" font-size="11">MonoTemplate</text>
  
  <rect x="215" y="525" width="100" height="30" rx="4"/>
  <rect x="220" y="530" width="18" height="18" rx="3"/>
  <text x="245" y="545" fill="#94a3b8" font-family="Arial" font-size="11">MasterData</text>
  
  <!-- Test Connection button -->
  <rect fill="#334155" x="70" y="630" width="150" height="40" rx="8"/>
  <text x="95" y="655" fill="#cbd5e1" font-family="Arial" font-size="12">⚡ Test Connection</text>
  
  <!-- Footer buttons -->
  <rect fill="#334155" x="520" y="630" width="150" height="40" rx="8"/>
  <text x="565" y="655" fill="#cbd5e1" font-family="Arial" font-size="12">Cancel</text>
  
  <rect fill="#3b82f6" x="680" y="630" width="150" height="40" rx="8"/>
  <text x="720" y="655" fill="white" font-family="Arial" font-size="12" font-weight="bold">Save Settings</text>
</svg>
