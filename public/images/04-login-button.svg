<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <rect fill="#1e293b" width="1200" height="200"/>
  
  <!-- Header -->
  <rect fill="#0f172a" x="0" y="0" width="1200" height="60"/>
  <rect fill="#3b82f6" x="20" y="12" width="40" height="36" rx="8"/>
  <text x="70" y="38" fill="white" font-family="Arial" font-size="18" font-weight="bold">Data Seeder</text>
  
  <!-- Settings button -->
  <rect fill="#334155" x="950" y="15" width="80" height="30" rx="6"/>
  <text x="960" y="35" fill="#cbd5e1" font-family="Arial" font-size="12">Cài đặt</text>
  
  <!-- Login button (highlighted) -->
  <rect fill="#f59e0b" x="1040" y="15" width="100" height="30" rx="6"/>
  <text x="1065" y="35" fill="#1e293b" font-family="Arial" font-size="12" font-weight="bold">Đăng nhập</text>
  
  <!-- Annotation -->
  <path d="M 1090 50 L 1090 80 L 1140 80" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <rect fill="#f59e0b" x="1050" y="80" width="130" height="35" rx="4"/>
  <text x="1060" y="98" fill="#1e293b" font-family="Arial" font-size="10" font-weight="bold">Click để đăng nhập</text>
  <text x="1060" y="110" fill="#1e293b" font-family="Arial" font-size="9">Auth Server</text>
</svg>